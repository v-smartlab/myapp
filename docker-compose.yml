# docker-compose.yml — Docker Config Generator v4
# ── Usage ─────────────────────────────────────────────────────────
# Development:  docker compose up --build
# Staging:      APP_ENV=staging docker compose up -d
# Production:   APP_ENV=prod APP_VERSION=1.2.3 docker compose up -d
# ─────────────────────────────────────────────────────────────────

services:
  app:
    image: vsmartlab/myapp:${APP_VERSION:-1.0.0}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - APP_VERSION=${APP_VERSION:-1.0.0}
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.${APP_ENV:-dev}
    environment:
      - APP_ENV=${APP_ENV:-dev}
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_NAME:-appdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-appuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - app-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
